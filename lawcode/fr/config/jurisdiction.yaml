jurisdiction:
  id: jur-fr-national
  country: FR
  level: federal
  parent_id: null
  name:
    fr: Republique francaise
  legal_tradition: Civil law (Napoleonic code)
  language_regime: Francais
  default_language: fr

defaults:
  domain: jurisdiction
  jurisdiction_id: fr-cnav
  effective_from: '1900-01-01'
values:
- key: jurisdiction.fr.howto_url
  value: 'https://www.service-public.fr/'
  value_type: string
  citation: 'Service-Public.fr — portail officiel de l''administration française'
  rationale: 'Primary citizen-facing landing for la retraite de base. Substrate-resolved per govops-022.'
