# yaml-language-server: $schema=../../../schema/lawcode-v1.0.json
# jp/config/jurisdiction.yaml — see ca/config/jurisdiction.yaml for the
# load-bearing comment. Substrate-resolved per govops-022.
# Per ADR-019 the `jurisdiction:` block declares identity for the
# lawcode-as-discovery loader (ADR-020). default_language="en" is intentional:
# the demo UI does not yet ship a Japanese locale (no messages/ja.json), so
# JP falls back to English. Adding a Japanese locale is its own follow-up.

jurisdiction:
  id: jur-jp-national
  country: JP
  level: federal
  parent_id: null
  name:
    en: Nihon-koku (Japan)
  legal_tradition: Civil law (Japanese hybrid; German + French + post-war common-law influence)
  language_regime: Nihongo (Japanese)
  default_language: en

defaults:
  domain: jurisdiction
  jurisdiction_id: jp-koukinenkin
  effective_from: '1900-01-01'
values:
- key: jurisdiction.jp.howto_url
  value: 'https://www.nenkin.go.jp/'
  value_type: string
  citation: '日本年金機構 (Japan Pension Service) — official portal'
  rationale: 'Primary citizen-facing landing for 厚生年金保険 / 老齢基礎年金. Substrate-resolved per govops-022.'
