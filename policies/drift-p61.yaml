# AIOS drift scanner rule-pack for 61-GovOps (agentic-state/GovOps-LaC).
#
# Loaded automatically by `aios drift scan --path <repo>` via the engine's
# policies/drift-*.yaml auto-discovery. Documents the project-specific
# exceptions to the engine's defaults.

# 61-GovOps is a PUBLIC-tier repo on agentic-state. Per the two-tier layout
# doctrine, public-tier project repos hold only public-safe content;
# canonical plans and Claude-Code-internal instructions live in the
# maintainer's private workspace, not here. README.md is the only
# required anchor.
required_files:
  - README.md

# The repo's GitHub identity slug. The README references "GovOps-LaC"
# (the friendly product name) as well; either string satisfies the
# repo-identity heuristic.
repo_name: GovOps-LaC

# Public-tier: repo_visibility: public is set above. Wave 8 also adds
# broken_links_excluded_patterns to suppress known false-positive classes:
repo_visibility: public

broken_links_excluded_patterns:
  - pattern: '^(\.\.?/)+govops-\d{3}-'
    description: references to nonexistent govops-NNN spec stubs (003/014/015/016 etc) that were never committed; pattern allows any depth of relative-path prefix
  - pattern: '^docs/design/ADRs/README\.md$'
    description: ADR README index aggregated externally
  - pattern: '\.claude/agents/'
    description: subagent definitions live in private workspace per two-tier doctrine
