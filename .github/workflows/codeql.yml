name: CodeQL

# Tier 1 CI cost optimization (2026-05-18): CodeQL runs post-merge and on
# weekly schedule only. Per-PR is unnecessary for a public-good repo
# where main is the integration target; security findings on the merged
# tree drive issue creation, not PR-blocking. See:
# eva-foundation/memory/reference_ci_cost_optimization_tier1_2026-05-18.
on:
  push:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # Project-specific filters for false positives whose underlying
          # guards live next to the flagged code. See the config for the
          # rationale paired with each filter.
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
