name: Update visual snapshots (Linux baselines)

# LO-011: visual regression expansion. Workflow_dispatch entry point that
# regenerates Linux baselines for the visual.spec.ts suite across all 3
# browser projects (chromium / firefox / webkit) + both locales (en / fr).
# Resulting PNG snapshots are uploaded as artifacts; Marco downloads and
# commits them to enable RUN_VISUAL_REGRESSION=1 in the main CI.
#
# Usage: GitHub Actions UI -> "Update visual snapshots (Linux baselines)"
# -> Run workflow.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update snapshots for (default: current ref)"
        required: false
        default: ""

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install -e ".[dev]"
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Generate baselines (visual spec, --update-snapshots)
        working-directory: web
        env:
          # Force the spec to run even though we are inside CI -- the
          # default skip is meant to keep the regular E2E lane green
          # while baselines are missing; this workflow's whole purpose
          # is to generate them.
          RUN_VISUAL_REGRESSION: "1"
        run: npx playwright test e2e/visual.spec.ts --update-snapshots
      - name: Upload baselines as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux
          path: web/e2e/visual.spec.ts-snapshots/
          retention-days: 14
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14
