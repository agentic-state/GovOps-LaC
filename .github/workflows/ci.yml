name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
      - "CODEOWNERS"
      - ".github/CODEOWNERS"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python scripts/check_no_hardcoded_constants.py
      # Phase 5 gate: every YAML under lawcode/ must validate against
      # schema/lawcode-v1.0.json + schema/configvalue-v1.0.json.
      - name: Validate lawcode/ against JSON Schema
        run: python scripts/validate_lawcode.py
      # Phase 6+ contract gate (PLAN §9 risk register row 2): the live
      # FastAPI OpenAPI document must match the committed snapshot at
      # docs/api/openapi-v0.3.0-draft.json. Lovable consumes the snapshot;
      # silent drift breaks the contract.
      - name: OpenAPI snapshot drift check
        run: python scripts/check_openapi_drift.py
      - run: pytest -v
      # Phase 3 strict-mode gate (per ADR-004 §3): every resolve must hit the
      # substrate (YAML) — never fall through to LEGACY_CONSTANTS.
      - name: Strict-mode pytest (no LEGACY fallthrough)
        env:
          AIA_CONFIG_STRICT: "1"
        run: pytest -v

  e2e:
    # Tier 1 CI cost optimization (2026-05-18): cross-browser E2E is the
    # worst per-PR offender (~22 min/run). Move it to post-merge (push to
    # main) only. Per-PR keeps the fast 3.10/3.11/3.12 unit-test matrix
    # plus all the must-pass gates above (schema + OpenAPI drift + strict
    # mode). E2E regressions are still caught on every merge to main and
    # block deploy via the same artifact path. See:
    # eva-foundation/memory/reference_ci_cost_optimization_tier1_2026-05-18.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    name: E2E (Playwright + axe, cross-browser)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install -e ".[dev]"
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Journey coverage gate
        working-directory: web
        run: npm run check:coverage
      - name: Vitest (i18n ICU + impact mock + components)
        # v3.1 L5: PR #46 shipped ICU UNCLOSED_TAG breakage in runbook
        # strings that vitest catches in 0.8s but Playwright cannot see
        # because the broken keys don't appear in the journeys it walks.
        # Run vitest before Playwright so this class of bug fails fast.
        working-directory: web
        run: npx vitest run
      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Run E2E suite
        working-directory: web
        env:
          CI: "1"
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14
      - name: Upload screenshots and traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: web/test-results/
          retention-days: 14
